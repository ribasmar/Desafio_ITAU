<svg width="64" height="64" viewBox="0 0 64 64" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CopomLens ícone</title>
  <desc>Ícone solo do CopomLens — lente de mira em teal</desc>

  <rect width="64" height="64" rx="14" fill="#E1F5EE"/>

  <!-- lente -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#1D9E75" stroke-width="2"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="5"  fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="2"  fill="#1D9E75"/>

  <!-- mira -->
  <line x1="32" y1="12" x2="32" y2="6"  stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="58" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="6"  y2="32" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="32" x2="58" y2="32" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
</svg>
