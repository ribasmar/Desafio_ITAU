<svg width="660" height="120" viewBox="0 0 660 120" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CopomLens</title>
  <desc>Logo oficial do projeto CopomLens — lente de mira com nome e tagline</desc>

  <!-- ícone lente -->
  <circle cx="60" cy="55" r="40" fill="none" stroke="#1D9E75" stroke-width="2"/>
  <circle cx="60" cy="55" r="24" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <circle cx="60" cy="55" r="9" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <circle cx="60" cy="55" r="3.5" fill="#1D9E75"/>

  <!-- cruzes da mira -->
  <line x1="60" y1="15" x2="60" y2="5"  stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="95" x2="60" y2="105" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="55" x2="10" y2="55" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="55" x2="110" y2="55" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>

  <!-- nome -->
  <text x="126" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="500" letter-spacing="-1" fill="#1A1A1A">Copom</text>
  <text x="126" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="500" letter-spacing="-1">
    <tspan fill="#1A1A1A">Copom</tspan><tspan fill="#1D9E75">Lens</tspan>
  </text>

  <!-- tagline -->
  <text x="128" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#888780">Uma lente sobre o que o Banco Central realmente está dizendo</text>
</svg>
